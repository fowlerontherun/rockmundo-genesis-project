name: Phase 5 Live Gig Release Gate

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: phase-5-live-gig-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-unit-build:
    name: Frontend unit, lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm run test:gig-experience:unit
      - run: npm run test:gig-experience:replay
      - run: npm run test:gig-experience:viewer
      - run: npm run test:gig-experience:audio
      - run: npm run test:gig-experience:component

  browser-a11y:
    name: Real browser and axe gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx playwright install --with-deps chromium
      - run: npm run test:gig-experience:e2e
      - run: npm run test:gig-experience:a11y
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phase-5-playwright-artifacts
          path: |
            playwright-report
            test-results/gig-experience
          retention-days: 14

  database:
    name: Supabase SQL release gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: supabase/setup-cli@v1
        with:
          version: 2.31.8
      - run: npm ci --legacy-peer-deps
      - run: npm run test:gig-experience:db
