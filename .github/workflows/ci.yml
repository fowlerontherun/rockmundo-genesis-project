name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:unit -- --reporter=default
      - name: Balance validation gate
        run: npm run validate:balance
      - name: Progression programme validation gate
        run: npm run validate:progression-programme
      - name: Beta smoke tests
        run: npm run test:smoke -- --reporter=default
      - name: Build
        run: npm run build
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.31.8
      - name: Festival SQL tests
        run: npm run test:festivals:db
      - name: Upload Supabase logs on festival DB gate failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-logs
          path: supabase/.branches/**/logs/**
          if-no-files-found: ignore
